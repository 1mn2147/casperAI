version: '3.8'

services:
  casper-ai:
    build: .
    container_name: casper_ai_server
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY}
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
